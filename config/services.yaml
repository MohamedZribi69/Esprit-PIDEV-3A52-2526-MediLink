# This file is the entry point to configure your own services.

parameters:
    openai_api_key_default: ''
    mailer_from: 'noreply@medilink.local'
    admin_access_role: ROLE_ADMIN

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\PdfService:
        arguments:
            $container: '@service_container'

    App\Service\DonCategorySuggestionService:
        arguments:
            $openaiApiKey: '%env(trim:default:openai_api_key_default:OPENAI_API_KEY)%'

    App\Service\DonScoringService:
        arguments:
            $openaiApiKey: '%env(trim:default:openai_api_key_default:OPENAI_API_KEY)%'

    App\Service\EventDescriptionGenerator:
        arguments:
            $huggingfaceApiKey: '%env(trim:default::HUGGINGFACE_API_KEY)%'

    App\Service\EventNotificationMailer:
        arguments:
            $fromEmail: '%mailer_from%'
            $projectDir: '%kernel.project_dir%'
            $kernelEnvironment: '%kernel.environment%'
    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
